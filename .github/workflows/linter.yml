name: 🧹 Lint Code Base
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v8.7.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_MARKDOWN: true
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
          UPDATE_EXISTING_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
          GITHUB_PULL_REQUEST_SUMMARY_COMMENT_HEADER: "## Linting Results"
          GITHUB_PULL_REQUEST_SUMMARY_COMMENT_FOOTER: "### Linting Results generated"
          MARKDOWN_LINTER_RULES: .markdown-lint.yml
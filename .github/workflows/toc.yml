name: 🌴 Generate TOC
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only allow write operations when the workflow is running in the base repo context.
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: technote-space/toc-generator@v4
        with:
          TOC_TITLE: "## Contents"
          CREATE_PR: true
          TARGET_PATHS: "README.md,CONTRIBUTING.md,erv.md"